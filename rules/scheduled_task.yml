title: Scheduled Task Creation
id: 22222222-2222-2222-2222-222222222222
status: experimental
description: Detects creation of scheduled tasks via schtasks. Maps to T1053.005.
references:
  - https://attack.mitre.org/techniques/T1053/005
tags:
  - attack.persistence
  - attack.privilege-escalation
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  condition: selection
level: medium
