title: Suspicious PowerShell Encoded Command
id: 11111111-1111-1111-1111-111111111111
status: experimental
description: Detects PowerShell -EncodedCommand usage often seen in offensive tooling.
references:
  - https://attack.mitre.org/techniques/T1059/001
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains: ' -enc'
  condition: selection
level: high
